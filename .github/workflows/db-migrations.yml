name: DB Migration Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/indexer/src/db/migrations/**'
      - '.github/workflows/db-migrations.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/indexer/src/db/migrations/**'
      - '.github/workflows/db-migrations.yml'

jobs:
  migration-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fund_my_cause_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fund_my_cause_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/indexer/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: services/indexer

      - name: Run migrations
        run: npx ts-node --esm src/db/migrations/run.ts
        working-directory: services/indexer

      - name: Verify schema
        run: |
          TABLES=$(psql "$DATABASE_URL" -t -c \
            "SELECT table_name FROM information_schema.tables \
             WHERE table_schema = 'public' ORDER BY table_name;")
          echo "Tables created:"
          echo "$TABLES"

      - name: Run migration tests
        run: npx vitest run src/db/migrations/migration.test.ts
        working-directory: services/indexer
