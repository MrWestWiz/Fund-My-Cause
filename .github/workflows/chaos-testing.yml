name: Chaos / Resilience Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/interface/src/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/interface/src/**"
  workflow_dispatch:

jobs:
  unit-chaos:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/interface

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run resilience unit tests
        run: npx vitest run src/services/__tests__/resilience.test.ts --reporter=verbose

      - name: Run RPC resilience tests
        run: npx vitest run src/lib/__tests__/rpc-resilience.test.ts --reporter=verbose

      - name: Run standard tests (ensure chaos injection didn't break anything)
        run: npx vitest run --reporter=verbose

  e2e-chaos:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/interface

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org

      - name: Start server
        run: |
          npm start &
          sleep 5
          curl -s -o /dev/null -w "%{http_code}" http://localhost:3000

      - name: Smoke test key pages load under simulated load
        run: |
          for i in $(seq 1 20); do
            curl -s -o /dev/null -w " %{http_code}" http://localhost:3000/en/campaigns &
          done
          wait
          echo "--- done ---"
